version: 2
project_name: civo
release:
  github:
    owner: civo
    name: cli
  draft: true
  use_existing_draft: true
  prerelease: auto
  make_latest: false
  mode: replace
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - "386"
      - "amd64"
      - "arm"
      - "arm64"
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: windows
        goarch: "386"
      - goos: windows
        goarch: "arm"
    ldflags:
      - -s -w -X  github.com/civo/cli/common.VersionCli={{.Version}} -X  github.com/civo/cli/common.CommitCli={{.Commit}} -X  github.com/civo/cli/common.DateCli={{.Date}}
checksum:
  name_template: "{{ .ProjectName }}-{{ .Version }}-checksums.sha256"
changelog:
  use: github-native
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - Merge pull request
      - Merge branch
archives:
  - name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
brews:
  - name: civo
    repository:
      owner: civo
      name: homebrew-tools
      pull_request:
        enabled: true
        base:
          owner: civo
          name: homebrew-tools
          branch: master
    commit_author:
      name: civobot
      email: hello@civo.com
    directory: Formula
    homepage: "https://github.com/civo/cli"
    description: "CLI for managing Civo resources."
dockers:
  - goos: linux
    goarch: amd64
    ids:
      - civo
    image_templates:
      - "civo/cli:latest"
      - "civo/cli:{{ .Tag }}"
    dockerfile: docker/Dockerfile
nfpms:
  - file_name_template: "{{ .ProjectName }}_{{ .Arch }}"
    homepage: https://github.com/civo/cli
    description: Our Command Line Interface (CLI) for interacting with your Civo resources
    maintainer: Alejandro J. Nuñez Madrazo <alejandro@civo.com>
    license: MIT
    vendor: Civo
    formats:
      - deb
      - rpm
